services:
  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}

  db:
    image: postgres:16-alpine
    container_name: el_bulk_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-elbulk}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-elbulkpass}
      POSTGRES_DB: ${DB_NAME:-elbulk}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-elbulk}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: el_bulk_backend_prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${DB_USER:-elbulk}:${DB_PASSWORD:-elbulkpass}@db:5432/${DB_NAME:-elbulk}?sslmode=verify-full
      JWT_SECRET: ${JWT_SECRET}
      PORT: "8080"
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: el_bulk_frontend_prod
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      INTERNAL_API_URL: http://backend:8080
    expose:
      - "3000"

volumes:
  caddy_data:
  caddy_config:
  pgdata_prod:
