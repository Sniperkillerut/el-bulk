services:
  db:
    image: postgres:16-alpine
    container_name: el_bulk_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: elbulk
      POSTGRES_PASSWORD: elbulkpass
      POSTGRES_DB: elbulk
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elbulk"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: el_bulk_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://elbulk:elbulkpass@db:5432/elbulk?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-prod}
      PORT: "8080"
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: el_bulk_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"

volumes:
  pgdata:
