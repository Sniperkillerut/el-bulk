# ==============================================================================
# El Bulk - Cloud Build Pipeline
# ==============================================================================
# Builds and deploys both backend and frontend to Cloud Run.
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_DB_CONNECTION_NAME="proj:region:inst",_DB_IAM_USER="proj-number-compute@developer"
#
# Required substitutions (no defaults):
#   _DB_CONNECTION_NAME    Cloud SQL connection name (project:region:instance)
#   _GCS_BUCKET            GCS bucket name for product images
#
# See docs/GCP_DEPLOYMENT.md for the full deployment guide.
# ==============================================================================

timeout: '1800s' # 30 min max build time

steps:
  # ------------------------------------------------------------------
  # 0. Enable required APIs (idempotent — safe to run every deploy)
  # ------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'enable-apis'
    entrypoint: 'gcloud'
    args:
      - 'services'
      - 'enable'
      - 'cloudtrace.googleapis.com'
      - 'run.googleapis.com'
      - 'sqladmin.googleapis.com'
      - 'secretmanager.googleapis.com'

  # ------------------------------------------------------------------
  # 1. Build Backend Image
  # ------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    waitFor: ['-'] # Start immediately (parallel with API enable)
    args:
      - 'build'
      - '--cache-from'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/backend:latest'
      - '-t'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/backend:${_TAG}'
      - '-t'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/backend:latest'
      - './backend'

  # ------------------------------------------------------------------
  # 2. Build Frontend Image (with build-time args from Secret Manager)
  # ------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    waitFor: ['-'] 
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        docker build \
          --cache-from ${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend:latest \
          -t ${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend:${_TAG} \
          -t ${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend:latest \
          --build-arg NEXT_PUBLIC_API_URL=$$API_URL \
          --build-arg NEXT_PUBLIC_GA_ID=$$GA_ID \
          --build-arg NEXT_PUBLIC_META_PIXEL_ID=$$META_PIXEL_ID \
          --build-arg NEXT_PUBLIC_GOOGLE_ADS_ID=$$GOOGLE_ADS_ID \
          --build-arg NEXT_PUBLIC_HOTJAR_ID=$$HOTJAR_ID \
          --build-arg INTERNAL_API_URL=${_BACKEND_INTERNAL_URL} \
          ./frontend
    secretEnv: ['API_URL', 'GA_ID', 'META_PIXEL_ID', 'GOOGLE_ADS_ID', 'HOTJAR_ID']

  # ------------------------------------------------------------------
  # 3. Authenticate and Push Images (Diagnostic Mode)
  # ------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'diagnostic-identity'
    waitFor: ['-']
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        echo "--- Build Identity ---"
        gcloud auth list
        echo "--- Build Config ---"
        gcloud config list
        echo "--- Registry Access Check ---"
        gcloud artifacts repositories describe ${_REPOSITORY} --location=${_LOCATION} --project=${PROJECT_ID}

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'auth-docker'
    waitFor: ['diagnostic-identity']
    entrypoint: 'gcloud'
    args: ['auth', 'configure-docker', '${_LOCATION}-docker.pkg.dev', '--quiet', '--project=${PROJECT_ID}']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    waitFor: ['build-backend', 'auth-docker']
    args: ['push', '--all-tags', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/backend']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    waitFor: ['build-frontend', 'auth-docker']
    args: ['push', '--all-tags', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend']

  # ------------------------------------------------------------------
  # 4. Deploy Backend to Cloud Run
  # ------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    waitFor: ['push-backend', 'enable-apis']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'el-bulk-backend'
      - '--image'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/backend:${_TAG}'
      - '--region'
      - '${_LOCATION}'
      - '--platform'
      - 'managed'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '${_BACKEND_MIN_INSTANCES}'
      - '--max-instances'
      - '${_BACKEND_MAX_INSTANCES}'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '300'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances=${_DB_CONNECTION_NAME}'
      - '--set-secrets=DATABASE_URL=ELBULK_DB_URL:latest,ENCRYPTION_KEY=ELBULK_ENCRYPTION_KEY:latest,JWT_SECRET=ELBULK_JWT_SECRET:latest,SMTP_PASS=ELBULK_SMTP_PASS:latest,GOOGLE_CLIENT_SECRET=ELBULK_GOOGLE_CLIENT_SECRET:latest,FACEBOOK_CLIENT_SECRET=ELBULK_FACEBOOK_CLIENT_SECRET:latest'
      - '--set-secrets=GCP_BUCKET_NAME=ELBULK_GCS_BUCKET:latest,FRONTEND_ORIGIN=ELBULK_FRONTEND_ORIGIN:latest,API_URL=ELBULK_API_URL:latest,GOOGLE_CLIENT_ID=ELBULK_GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_ID_ADMIN=ELBULK_GOOGLE_CLIENT_ID_ADMIN:latest,FACEBOOK_CLIENT_ID=ELBULK_FACEBOOK_CLIENT_ID:latest'
      - '--set-secrets=SMTP_HOST=ELBULK_SMTP_HOST:latest,SMTP_PORT=ELBULK_SMTP_PORT:latest,SMTP_USER=ELBULK_SMTP_USER:latest,SMTP_FROM=ELBULK_SMTP_FROM:latest,POKEMON_TCG_API_KEY=ELBULK_POKEMON_TCG_API_KEY:latest,GOOGLE_CLIENT_SECRET_ADMIN=ELBULK_GOOGLE_CLIENT_SECRET_ADMIN:latest,ADMIN_EMAILS=ELBULK_ADMIN_EMAILS:latest'
      - '--set-env-vars=STORAGE_TYPE=gcp'
      - '--set-env-vars=APP_ENV=production'
      - '--set-env-vars=INSTANCE_CONNECTION_NAME=${_DB_CONNECTION_NAME}'
      - '--set-env-vars=DB_IAM_AUTH=${_DB_IAM_AUTH}'
      - '--set-env-vars=DB_IAM_USER=${_DB_IAM_USER}'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID}'
      - '--set-env-vars=LOG_LEVEL=INFO'
      - '--set-env-vars=LOG_FORMAT=json'

  # ------------------------------------------------------------------
  # 5. Deploy Frontend to Cloud Run
  # ------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    waitFor: ['push-frontend', 'deploy-backend']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'el-bulk-frontend'
      - '--image'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend:${_TAG}'
      - '--region'
      - '${_LOCATION}'
      - '--platform'
      - 'managed'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '${_FRONTEND_MIN_INSTANCES}'
      - '--max-instances'
      - '${_FRONTEND_MAX_INSTANCES}'
      - '--concurrency'
      - '200'
      - '--timeout'
      - '60'
      - '--allow-unauthenticated'
      - '--set-env-vars=INTERNAL_API_URL=${_BACKEND_INTERNAL_URL}'

# Images to store in Artifact Registry
images:
  - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/backend:${_TAG}'
  - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/backend:latest'
  - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend:${_TAG}'
  - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend:latest'

# ==============================================================================
# Substitutions - Override with --substitutions flag
# ==============================================================================
substitutions:
  # --- Infrastructure (required) ---
  _TAG: 'latest'
  _LOCATION: 'us-central1'
  _REPOSITORY: 'el-bulk-repo'
  _DB_CONNECTION_NAME: 'my-elbulk-prod:us-central1:el-bulk-db' # REQUIRED: project:region:instance

  # --- URLs ---
  _BACKEND_INTERNAL_URL: 'https://api.elbulk.com'

  # --- Scaling ---
  _BACKEND_MIN_INSTANCES: '0'
  _BACKEND_MAX_INSTANCES: '5'
  _FRONTEND_MIN_INSTANCES: '0'
  _FRONTEND_MAX_INSTANCES: '10'
  
  # --- IAM Authentication ---
  _DB_IAM_AUTH: 'true'
  _DB_IAM_USER: '41267920201-compute@developer'

availableSecrets:
  secretManager:
  - versionName: projects/${PROJECT_ID}/secrets/ELBULK_API_URL/versions/latest
    env: 'API_URL'
  - versionName: projects/${PROJECT_ID}/secrets/ELBULK_GA_ID/versions/latest
    env: 'GA_ID'
  - versionName: projects/${PROJECT_ID}/secrets/ELBULK_META_PIXEL_ID/versions/latest
    env: 'META_PIXEL_ID'
  - versionName: projects/${PROJECT_ID}/secrets/ELBULK_GOOGLE_ADS_ID/versions/latest
    env: 'GOOGLE_ADS_ID'
  - versionName: projects/${PROJECT_ID}/secrets/ELBULK_HOTJAR_ID/versions/latest
    env: 'HOTJAR_ID'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8' # Faster builds (Go compile + Next.js build are CPU-heavy)
