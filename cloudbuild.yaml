# ==============================================================================
# El Bulk — Cloud Build Pipeline
# ==============================================================================
# Builds and deploys both backend and frontend to Cloud Run.
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_DB_CONNECTION_NAME="proj:region:inst",_GCS_BUCKET="my-bucket"
#
# Required substitutions (no defaults):
#   _DB_CONNECTION_NAME    Cloud SQL connection name (project:region:instance)
#   _GCS_BUCKET            GCS bucket name for product images
#
# See docs/GCP_DEPLOYMENT.md for the full deployment guide.
# ==============================================================================

timeout: '1800s' # 30 min max build time

steps:
  # ------------------------------------------------------------------
  # 0. Enable required APIs (idempotent — safe to run every deploy)
  # ------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'enable-apis'
    entrypoint: 'gcloud'
    args:
      - 'services'
      - 'enable'
      - 'cloudtrace.googleapis.com'
      - 'run.googleapis.com'
      - 'sqladmin.googleapis.com'
      - 'secretmanager.googleapis.com'

  # ------------------------------------------------------------------
  # 1. Build Backend Image
  # ------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    waitFor: ['-'] # Start immediately (parallel with API enable)
    args:
      - 'build'
      - '--cache-from'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/backend:latest'
      - '-t'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/backend:${SHORT_SHA}'
      - '-t'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/backend:latest'
      - './backend'

  # ------------------------------------------------------------------
  # 2. Build Frontend Image (with build-time args)
  # ------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    waitFor: ['-'] # Start immediately (parallel with backend build)
    args:
      - 'build'
      - '--cache-from'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend:latest'
      - '-t'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend:${SHORT_SHA}'
      - '-t'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=${_API_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_GA_ID=${_GA_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_META_PIXEL_ID=${_META_PIXEL_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_GOOGLE_ADS_ID=${_GOOGLE_ADS_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_HOTJAR_ID=${_HOTJAR_ID}'
      - './frontend'

  # ------------------------------------------------------------------
  # 3. Push Images (after builds complete)
  # ------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    waitFor: ['build-backend']
    args: ['push', '--all-tags', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/backend']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    waitFor: ['build-frontend']
    args: ['push', '--all-tags', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend']

  # ------------------------------------------------------------------
  # 4. Deploy Backend to Cloud Run
  # ------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    waitFor: ['push-backend', 'enable-apis']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'el-bulk-backend'
      - '--image'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/backend:${SHORT_SHA}'
      - '--region'
      - '${_LOCATION}'
      - '--platform'
      - 'managed'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '${_BACKEND_MIN_INSTANCES}'
      - '--max-instances'
      - '${_BACKEND_MAX_INSTANCES}'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '300'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances=${_DB_CONNECTION_NAME}'
      - '--set-secrets=DATABASE_URL=ELBULK_DB_URL:latest,ENCRYPTION_KEY=ELBULK_ENCRYPTION_KEY:latest,JWT_SECRET=ELBULK_JWT_SECRET:latest,SMTP_PASS=ELBULK_SMTP_PASS:latest,GOOGLE_CLIENT_SECRET=ELBULK_GOOGLE_CLIENT_SECRET:latest,FACEBOOK_CLIENT_SECRET=ELBULK_FACEBOOK_CLIENT_SECRET:latest'
      - '--set-env-vars=STORAGE_TYPE=gcp,GCP_BUCKET_NAME=${_GCS_BUCKET},APP_ENV=production,INSTANCE_CONNECTION_NAME=${_DB_CONNECTION_NAME},DB_IAM_AUTH=true,GOOGLE_CLOUD_PROJECT=${PROJECT_ID},FRONTEND_ORIGIN=${_FRONTEND_ORIGIN},GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID},FACEBOOK_CLIENT_ID=${_FACEBOOK_CLIENT_ID},SMTP_HOST=${_SMTP_HOST},SMTP_PORT=${_SMTP_PORT},SMTP_USER=${_SMTP_USER},SMTP_FROM=${_SMTP_FROM},LOG_LEVEL=INFO,LOG_FORMAT=json,POKEMON_TCG_API_KEY=${_POKEMON_TCG_API_KEY}'

  # ------------------------------------------------------------------
  # 5. Deploy Frontend to Cloud Run
  # ------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    waitFor: ['push-frontend', 'deploy-backend']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'el-bulk-frontend'
      - '--image'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend:${SHORT_SHA}'
      - '--region'
      - '${_LOCATION}'
      - '--platform'
      - 'managed'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '${_FRONTEND_MIN_INSTANCES}'
      - '--max-instances'
      - '${_FRONTEND_MAX_INSTANCES}'
      - '--concurrency'
      - '200'
      - '--timeout'
      - '60'
      - '--allow-unauthenticated'
      - '--set-env-vars=INTERNAL_API_URL=${_BACKEND_INTERNAL_URL}'

# Images to store in Artifact Registry
images:
  - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/backend:${SHORT_SHA}'
  - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/backend:latest'
  - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend:${SHORT_SHA}'
  - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/frontend:latest'

# ==============================================================================
# Substitutions — Override with --substitutions flag
# ==============================================================================
substitutions:
  # --- Infrastructure (required) ---
  _LOCATION: 'us-central1'
  _REPOSITORY: 'el-bulk-repo'
  _DB_CONNECTION_NAME: '' # REQUIRED: project:region:instance
  _GCS_BUCKET: ''         # REQUIRED: GCS bucket name

  # --- URLs ---
  _API_URL: 'https://api.elbulk.com'       # Baked into frontend at build time
  _FRONTEND_ORIGIN: 'https://elbulk.com'   # Backend CORS allow-origin
  _BACKEND_INTERNAL_URL: ''                 # Cloud Run backend URL for SSR rewrites

  # --- Scaling ---
  _BACKEND_MIN_INSTANCES: '0'
  _BACKEND_MAX_INSTANCES: '5'
  _FRONTEND_MIN_INSTANCES: '0'
  _FRONTEND_MAX_INSTANCES: '10'

  # --- OAuth ---
  _GOOGLE_CLIENT_ID: ''
  _FACEBOOK_CLIENT_ID: ''

  # --- SMTP ---
  _SMTP_HOST: ''
  _SMTP_PORT: '587'
  _SMTP_USER: ''
  _SMTP_FROM: ''

  # --- External APIs ---
  _POKEMON_TCG_API_KEY: ''

  # --- Analytics (baked into frontend at build time) ---
  _GA_ID: ''
  _META_PIXEL_ID: ''
  _GOOGLE_ADS_ID: ''
  _HOTJAR_ID: ''

options:
  logging: CLOUD_LOGGING
  machineType: 'E2_HIGHCPU_8' # Faster builds (Go compile + Next.js build are CPU-heavy)
