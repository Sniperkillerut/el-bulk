services:
  db:
    image: postgres:16-alpine
    container_name: el_bulk_db
    restart: unless-stopped
    env_file:
      - .env.local
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema:/schema
      - ./backend/db/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U elbulk" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: el_bulk_backend_dev
    entrypoint: [ "air" ]
    command: []
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    volumes:
      - ./backend:/app
      - ${APPDATA}/gcloud:/root/.config/gcloud:ro
      - /app/tmp

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: el_bulk_frontend_dev
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      PORT: "3000"
      NEXT_WDS_SOCKET_PORT: "3000"
      NEXT_PUBLIC_HMR_PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
