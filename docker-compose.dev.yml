services:
  db:
    image: postgres:16-alpine
    container_name: el_bulk_db
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema:/schema
      - ./backend/db/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backend/db/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./certs:/etc/postgresql/certs:ro
    command: >
      sh -c "cp /etc/postgresql/certs/server.crt /var/lib/postgresql/data/server.crt && 
             cp /etc/postgresql/certs/server.key /var/lib/postgresql/data/server.key && 
             cp /etc/postgresql/certs/ca.crt /var/lib/postgresql/data/root.crt && 
             chown postgres:postgres /var/lib/postgresql/data/server.crt /var/lib/postgresql/data/server.key /var/lib/postgresql/data/root.crt && 
             chmod 600 /var/lib/postgresql/data/server.key && 
             exec su-exec postgres postgres -c ssl=on 
                                           -c hba_file=/etc/postgresql/pg_hba.conf"
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U elbulk" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: el_bulk_backend_dev
    entrypoint: [ "air" ]
    command: []
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=verify-full&sslrootcert=/app/certs/ca.crt&sslcert=/app/certs/client.crt&sslkey=/app/certs/client.key
      # FRONTEND_ORIGIN: http://localhost (Already in .env)
      # JWT_SECRET: ${JWT_SECRET:-dev-secret} (Already in .env)
      # PORT: "8080" (Already in .env)
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./backend:/app
      - ./certs:/app/certs:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: el_bulk_frontend_dev
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - ./frontend/.env.local
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXT_WDS_SOCKET_PORT: "80"
      NEXT_PUBLIC_HMR_PORT: "80"
    ports:
      - "80:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
